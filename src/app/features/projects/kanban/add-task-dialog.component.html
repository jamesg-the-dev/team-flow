<h1 mat-dialog-title>Add Task</h1>
<div mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" required />
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        <mat-option *ngFor="let p of priorities" [value]="p">{{ p }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Assignee ID</mat-label>
      <input matInput formControlName="assigneeId" />
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Estimate Hours</mat-label>
      <input matInput type="number" formControlName="estimateHours" />
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Due Date</mat-label>
      <input matInput type="date" formControlName="dueDate" />
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Board Status</mat-label>
      <mat-select formControlName="column">
        <mat-option *ngFor="let c of columns" [value]="c">{{ c }}</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="submit()">Add</button>
</div>
