<div class="panel panel--wide">
  <header class="panel__header panel__header--row">
    <div>
      <h1 class="panel__title">Team</h1>
      <p class="panel__subtitle">Manage your team members</p>
    </div>
    <button mat-flat-button color="primary">
      <mat-icon>person_add</mat-icon>
      Invite Member
    </button>
  </header>

  <mat-card appearance="outlined">
    <mat-card-header
      ><mat-card-title class="card-title">Team Members</mat-card-title></mat-card-header
    >
    <mat-card-content>
      <ul class="pref-list">
        @for (member of team; track member.email) {
          <li class="pref">
            <div class="member">
              <span class="avatar avatar--md">{{ member.avatar }}</span>
              <div>
                <p class="pref__label">{{ member.name }}</p>
                <p class="pref__description">{{ member.email }}</p>
              </div>
            </div>
            <div class="member__actions">
              <span class="badge">{{ member.role }}</span>
              <button mat-button>Edit</button>
            </div>
          </li>
        }
      </ul>
    </mat-card-content>
  </mat-card>
</div>
