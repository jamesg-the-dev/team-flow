<div class="panel panel--wide">
  <header class="panel__header">
    <h1 class="panel__title">Team</h1>
    <p class="panel__subtitle">Manage your team members</p>
  </header>

  <app-team-members-card
    [members]="team()"
    [loading]="loading()"
    [error]="error()"
    addLabel="Invite Member"
    removeLabel="Remove from workspace"
    (add)="inviteMember()"
    (remove)="removeMember($event)"
  />
</div>
